<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Controller</title>
    <style>
        body { 
            font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; 
            color: #e0e0e0; margin: 0; padding: 20px; user-select: none; 
            touch-action: manipulation; -webkit-user-select: none;
        }
        h1 { color: #28a745; margin-bottom: 20px; }
        .btn { 
            display: inline-block; padding: 25px; font-size: 28px; margin: 10px; 
            width: 90px; height: 90px; cursor: pointer; border-radius: 20px; 
            border: none; background: #333; color: white; box-shadow: 0 4px #111;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #444; box-shadow: 0 0 #111; transform: translateY(4px); }
        .connect-btn { 
            background: #28a745; width: 220px; height: auto; font-size: 20px; 
            padding: 15px; margin-bottom: 30px; box-shadow: 0 4px #155d27;
        }
        .fire-btn {
            background: #c0392b; width: 140px; height: 140px; border-radius: 50%;
            font-size: 30px; font-weight: bold; border: 4px solid #7f8c8d;
            box-shadow: 0 8px #900000; margin-top: 20px;
        }
        .fire-btn:active {
            background: #e74c3c; box-shadow: 0 2px #900000; transform: translateY(6px);
        }
        #controls { margin-top: 20px; }
        .slider-container { margin: 30px auto; width: 80%; max-width: 400px; }
        input[type=range] { width: 100%; height: 15px; background: #444; outline: none; accent-color: #28a745; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Tank Commander</h1>
    <button id="connectBtn" class="btn connect-btn" onclick="connectBLE()">CONNECT TANK</button>
    <div id="status" class="status">Status: Disconnected</div>

    <div id="controls" style="display:none;">
        <div class="drive-grid">
            <button class="btn" ontouchstart="sendDrive('F')" ontouchend="sendDrive('S')" onmousedown="sendDrive('F')" onmouseup="sendDrive('S')">▲</button><br>
            <button class="btn" ontouchstart="sendDrive('L')" ontouchend="sendDrive('S')" onmousedown="sendDrive('L')" onmouseup="sendDrive('S')">◀</button>
            <button class="btn" ontouchstart="sendDrive('R')" ontouchend="sendDrive('S')" onmousedown="sendDrive('R')" onmouseup="sendDrive('S')">▶</button><br>
            <button class="btn" ontouchstart="sendDrive('B')" ontouchend="sendDrive('S')" onmousedown="sendDrive('B')" onmouseup="sendDrive('S')">▼</button>
        </div>

        <div>
            <button class="fire-btn" onclick="fireGun()">FIRE!</button>
        </div>

        <div class="slider-container">
            <p>Turret Aim: <span id="angleVal">90</span>°</p>
            <input type="range" min="0" max="180" value="90" oninput="updateServo(this.value)">
        </div>
    </div>

    <script>
        let driveChar, servoChar, gunChar;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const DRIVE_UUID   = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const SERVO_UUID   = "82250682-3b71-405e-ad61-344406560447";
        const GUN_UUID     = "e06d5c21-f18e-4912-9860-2646c245ef42";

        async function connectBLE() {
            const statusDiv = document.getElementById('status');
            try {
                statusDiv.innerText = "Status: Searching...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Lazy Queen BLE' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusDiv.innerText = "Status: Connecting...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                driveChar = await service.getCharacteristic(DRIVE_UUID);
                servoChar = await service.getCharacteristic(SERVO_UUID);
                gunChar = await service.getCharacteristic(GUN_UUID);

                document.getElementById('controls').style.display = 'block';
                document.getElementById('connectBtn').style.display = 'none';
                statusDiv.innerText = "Status: Connected to Lazy Queen";
                
                device.addEventListener('gattserverdisconnected', () => {
                    alert("Tank Disconnected!");
                    location.reload();
                });
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Status: Error - " + error.message;
            }
        }

        function sendDrive(cmd) {
            if (driveChar) driveChar.writeValue(new TextEncoder().encode(cmd));
        }

        function updateServo(val) {
            document.getElementById('angleVal').innerText = val;
            if (servoChar) servoChar.writeValue(new TextEncoder().encode(val));
        }

        function fireGun() {
            if (gunChar) {
                // Send 'F' for Fire. The ESP32 handles the timing.
                gunChar.writeValue(new TextEncoder().encode('F'))
                    .catch(err => console.log("Gun Error:", err));
            }
        }
    </script>
</body>
</html>
